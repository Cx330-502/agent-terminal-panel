name: Publish VS Code Marketplace

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: marketplace-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: marketplace-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify version
        id: version
        shell: bash
        run: |
          VERSION="$(node -p 'require("./package.json").version')"
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" != "v$VERSION" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check and test
        run: npm run check && npm test

      - name: Package six platform VSIX files
        run: npm run package

      - name: Sign in to Azure with GitHub OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure DevOps access token
        run: |
          az account get-access-token \
            --resource 499b84ac-1321-427f-aa17-267ca6975798 \
            --query expiresOn \
            --output tsv >/dev/null
          echo "Microsoft Entra ID token acquired for Azure DevOps."

      - name: Publish platform packages
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
        run: |
          npx vsce publish \
            --azure-credential \
            --skip-duplicate \
            --packagePath releases/v${{ steps.version.outputs.version }}/*.vsix

name: Publish VS Code Marketplace

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: marketplace-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: marketplace-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify version
        id: version
        shell: bash
        run: |
          VERSION="$(node -p 'require("./package.json").version')"
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" != "v$VERSION" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check and test
        run: npm run check && npm test

      - name: Browser regression gate
        run: npm run test:browser

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-regression-failure-${{ github.ref_name }}
          path: |
            artifacts/browser/
            test/*.png
          if-no-files-found: ignore

      - name: Package six platform VSIX files
        run: npm run package

      - name: Sign in to Azure with GitHub OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Marketplace publisher access
        env:
          PUBLISHER_ID: Cx330-502
        run: |
          set -euo pipefail
          marketplace_resource="499b84ac-1321-427f-aa17-267ca6975798"
          profile_id="$(az rest \
            --method get \
            --url https://app.vssps.visualstudio.com/_apis/profile/profiles/me \
            --resource "$marketplace_resource" \
            --query id \
            --output tsv)"
          echo "Marketplace profile identity: $profile_id"
          echo "Marketplace profile identity: \`$profile_id\`" >> "$GITHUB_STEP_SUMMARY"

          VSCE_PAT="$(az account get-access-token \
            --resource "$marketplace_resource" \
            --query accessToken \
            --output tsv)"
          echo "::add-mask::$VSCE_PAT"
          export VSCE_PAT
          npx vsce verify-pat "$PUBLISHER_ID"

      - name: Publish platform packages
        run: |
          set -euo pipefail
          shopt -s nullglob
          packages=(releases/v${{ steps.version.outputs.version }}/*.vsix)
          if [[ ${#packages[@]} -ne 6 ]]; then
            echo "Expected 6 platform packages, found ${#packages[@]}." >&2
            exit 1
          fi

          VSCE_PAT="$(az account get-access-token \
            --resource 499b84ac-1321-427f-aa17-267ca6975798 \
            --query accessToken \
            --output tsv)"
          echo "::add-mask::$VSCE_PAT"
          export VSCE_PAT

          for package in "${packages[@]}"; do
            npx vsce publish \
              --skip-duplicate \
              --packagePath "$package"
          done

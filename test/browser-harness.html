<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <title>Agent Terminal Panel Harness</title>
  <style>
    :root {
      --vscode-font-family: system-ui, sans-serif;
      --vscode-font-size: 13px;
      --vscode-editor-font-family: "DejaVu Sans Mono", monospace;
      --vscode-foreground: #cccccc;
      --vscode-descriptionForeground: #999999;
      --vscode-editor-background: #1e1e1e;
      --vscode-terminal-background: #1e1e1e;
      --vscode-terminal-foreground: #cccccc;
      --vscode-sideBar-background: #181818;
      --vscode-sideBar-foreground: #cccccc;
      --vscode-panel-background: #1e1e1e;
      --vscode-panel-border: #333333;
      --vscode-focusBorder: #007fd4;
      --vscode-list-hoverBackground: #2a2d2e;
      --vscode-list-activeSelectionBackground: #04395e;
      --vscode-list-activeSelectionForeground: #ffffff;
      --vscode-button-background: #0e639c;
      --vscode-button-foreground: #ffffff;
      --vscode-button-hoverBackground: #1177bb;
      --vscode-terminalCursor-foreground: #ffffff;
      --vscode-terminalCursor-background: #1e1e1e;
      --vscode-terminal-selectionBackground: #264f78;
      --vscode-terminal-ansiBlack: #000000;
      --vscode-terminal-ansiRed: #cd3131;
      --vscode-terminal-ansiGreen: #0dbc79;
      --vscode-terminal-ansiYellow: #e5e510;
      --vscode-terminal-ansiBlue: #2472c8;
      --vscode-terminal-ansiMagenta: #bc3fbc;
      --vscode-terminal-ansiCyan: #11a8cd;
      --vscode-terminal-ansiWhite: #e5e5e5;
      --vscode-terminal-ansiBrightBlack: #666666;
      --vscode-terminal-ansiBrightRed: #f14c4c;
      --vscode-terminal-ansiBrightGreen: #23d18b;
      --vscode-terminal-ansiBrightYellow: #f5f543;
      --vscode-terminal-ansiBrightBlue: #3b8eea;
      --vscode-terminal-ansiBrightMagenta: #d670d6;
      --vscode-terminal-ansiBrightCyan: #29b8db;
      --vscode-terminal-ansiBrightWhite: #ffffff;
    }
  </style>
  <link rel="stylesheet" href="../media/xterm.css">
  <link rel="stylesheet" href="../media/styles.css">
  <link rel="stylesheet" href="../media/attachments.css">
  <link rel="stylesheet" href="../media/startup.css">
  <link rel="stylesheet" href="../media/communication.css">
  <link rel="stylesheet" href="../media/sessionControls.css">
  <link rel="stylesheet" href="../media/search.css">
  <script>
    window.__webviewMessages = [];
    window.__persistedState = {};
    window.__hostSend = (data) => window.dispatchEvent(new MessageEvent('message', { data }));
    window.acquireVsCodeApi = () => ({
      postMessage(message) {
        window.__webviewMessages.push(message);
        if (message.type === 'ready') {
          setTimeout(() => window.__hostSend({
            type: 'initialize',
            sessions: [{
              id: 'session-1',
              name: 'Agent 1',
              cwd: '/workspace/中文项目',
              status: 'waiting',
              unread: false,
              isActive: true,
              canRestart: true,
              communication: {
                health: 'idle',
                healthBasis: 'network',
                silentForMs: 1800,
                sampledAt: Date.now(),
                pty: {
                  receivedBytes: 18000,
                  sentBytes: 320,
                  receiveRate: 0,
                  sendRate: 0
                },
                network: {
                  source: 'linux-ss',
                  available: true,
                  hasByteCounters: true,
                  connectionCount: 1,
                  loopback: true,
                  receivedBytes: 14000,
                  sentBytes: 2100,
                  receiveRate: 0,
                  sendRate: 0,
                  proxy: {
                    processName: 'cc-switch',
                    connectionCount: 1,
                    shared: true,
                    receivedBytes: 15000,
                    sentBytes: 2300,
                    receiveRate: 0,
                    sendRate: 0
                  }
                },
                provider: {
                  provider: 'codex',
                  source: 'codex-jsonl',
                  turnActive: false,
                  phase: 'complete',
                  lastTtftMs: 1850,
                  lastTurnDurationMs: 12400,
                  turnInputTokens: 6200,
                  turnOutputTokens: 940,
                  totalTokens: 18400,
                  contextWindow: 200000
                }
              }
            }],
            activeId: 'session-1',
            replays: {},
            terminalSettings: {
              fontFamily: 'DejaVu Sans Mono',
              fontSize: 14,
              fontWeight: 'normal',
              fontWeightBold: 'bold',
              lineHeight: 1,
              letterSpacing: 0,
              cursorStyle: 'block',
              cursorBlinking: false,
              cursorWidth: 1,
              scrollback: 1000,
              macOptionIsMeta: false,
              macOptionClickForcesSelection: false,
              altClickMovesCursor: true,
              fastScrollSensitivity: 5,
              mouseWheelScrollSensitivity: 1,
              wordSeparators: ' ()[]{}',
              minimumContrastRatio: 4.5,
              drawBoldTextInBrightColors: true,
              customGlyphs: true,
              rightClickBehavior: 'copyPaste',
              imagesEnabled: false
            },
            layoutSettings: {
              sessionListPosition: 'left'
            },
            launchProfiles: [
              { id: 'profile-0', name: 'Claude', command: 'claude' },
              { id: 'profile-1', name: 'Codex Full Auto', command: 'codex --full-auto' }
            ],
            workspaceRestore: {
              count: 2,
              names: ['Codex · 流量监测', 'Agent · 图标整理']
            },
            closedSessions: {
              count: 0
            },
            platform: 'linux'
          }), 0);
        } else if (message.type === 'saveAttachments') {
          setTimeout(() => window.__hostSend({
            type: 'attachmentResult',
            requestId: message.requestId,
            id: message.id,
            insertText: "'/remote/workspace-storage/pasted-image.png' ",
            savedCount: message.uploads.length + message.uris.length,
            errors: []
          }), 0);
        } else if (message.type === 'pickAttachments') {
          setTimeout(() => window.__hostSend({
            type: 'attachmentResult',
            requestId: 'picker-request',
            id: message.id,
            insertText: "'/remote/workspace-storage/picked-image.png' ",
            savedCount: 1,
            errors: []
          }), 0);
        }
      },
      getState() {
        return window.__persistedState;
      },
      setState(state) {
        window.__persistedState = state;
      }
    });
  </script>
</head>
<body>
  <div id="app" class="app-shell">
    <aside id="session-sidebar" class="session-sidebar" aria-label="Agent 会话列表">
      <header class="session-header">
        <span class="session-heading">会话</span>
        <span class="session-actions">
          <span class="new-session-split">
            <button id="new-session" class="icon-button split-primary" type="button" aria-label="使用默认命令新建会话" data-icon="add"></button>
            <button id="new-session-menu" class="icon-button split-secondary" type="button" aria-label="选择其他启动方式" aria-haspopup="menu" aria-controls="launch-menu" aria-expanded="false" data-icon="chevronDown"></button>
          </span>
        </span>
      </header>
      <div id="session-list" class="session-list" role="tablist"></div>
    </aside>
    <div id="session-splitter" class="session-splitter" role="separator" aria-label="调整会话列表宽度" aria-orientation="vertical" tabindex="0"></div>
    <main class="terminal-pane">
      <header id="active-header" class="active-header" hidden>
        <div class="active-meta">
          <span id="active-status" class="status-dot"></span>
          <span id="active-name" class="active-name"></span>
          <span id="active-cwd" class="active-cwd"></span>
        </div>
        <div id="communication-summary" class="communication-summary" role="status" aria-live="polite" hidden>
          <span class="communication-health">
            <span id="communication-dot" class="communication-dot" aria-hidden="true"></span>
            <span id="communication-health-full" class="communication-health-full"></span>
            <span id="communication-health-compact" class="communication-health-compact"></span>
          </span>
          <span id="communication-traffic" class="communication-traffic"></span>
          <span id="communication-latency" class="communication-latency"></span>
        </div>
        <span class="active-actions">
          <button id="find-terminal" class="icon-button" type="button" aria-label="在当前终端中查找" data-icon="search"></button>
          <button id="pick-attachments" class="icon-button" type="button" aria-label="选择图片文件" data-icon="image"></button>
          <button id="rename-active-session" class="icon-button" type="button" aria-label="重命名当前会话" data-icon="pencil"></button>
          <button id="restart-session" class="icon-button" type="button" aria-label="重启当前会话" data-icon="restart"></button>
        </span>
      </header>
      <section id="workspace-restore" class="workspace-restore" aria-live="polite" hidden>
        <span class="workspace-restore-copy">
          <strong id="workspace-restore-title"></strong>
          <span id="workspace-restore-detail"></span>
        </span>
        <span class="workspace-restore-actions">
          <button id="restore-workspace-sessions" class="primary-button compact-button" type="button">恢复全部</button>
          <button id="dismiss-workspace-restore" class="secondary-button compact-button" type="button">忽略</button>
        </span>
      </section>
      <div id="terminal-stack" class="terminal-stack">
        <div id="terminal-search" class="terminal-search" role="search" hidden>
          <input id="terminal-search-input" type="text" autocomplete="off" spellcheck="false" aria-label="在当前终端中查找">
          <span id="terminal-search-result" class="terminal-search-result" role="status" aria-live="polite"></span>
          <button id="terminal-search-previous" class="icon-button" type="button" aria-label="上一个匹配项" data-icon="arrowUp"></button>
          <button id="terminal-search-next" class="icon-button" type="button" aria-label="下一个匹配项" data-icon="arrowDown"></button>
          <button id="terminal-search-close" class="icon-button" type="button" aria-label="关闭查找" data-icon="close"></button>
        </div>
      </div>
      <div id="startup-overlay" class="startup-overlay" role="status" aria-live="polite" hidden>
        <div class="startup-card">
          <span class="startup-spinner" aria-hidden="true"></span>
          <span class="startup-copy">
            <strong id="startup-title" class="startup-title"></strong>
            <span id="startup-detail" class="startup-detail"></span>
          </span>
        </div>
      </div>
      <div id="attachment-overlay" class="attachment-overlay" hidden>
        <strong>放下图片</strong>
        <span>VS Code 资源管理器或系统文件管理器拖入时请按住 Shift；也可点击顶栏图片按钮</span>
      </div>
      <div id="attachment-status" class="attachment-status" role="status" aria-live="polite" hidden></div>
      <div id="empty-state" class="empty-state">
        <p>还没有 Agent 会话</p>
        <button id="empty-new-session" class="primary-button" type="button">使用默认命令新建</button>
        <button id="empty-new-session-menu" class="secondary-button" type="button" aria-haspopup="menu" aria-controls="launch-menu" aria-expanded="false">选择其他启动方式</button>
      </div>
    </main>
  </div>
  <div id="launch-menu" class="launch-menu" role="menu" aria-label="Agent 会话启动方式" hidden></div>
  <script src="../media/main.js"></script>
</body>
</html>
